<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, fv-viewport-fit=cover">
    <title>Disney Magical Library</title>
    <style>
        :root {
            --disney-gold: #c19b67;
            --disney-gold-dark: #8b6b3e;
            --bg-color: #1a0f00;
            --panel-color: #2b1d12;
            --text-color: #e0c58a;
            --bubble-bot: #f3e5ab;
            --bubble-bot-text: #332211;
            --bubble-user: #8b6b3e;
            --bubble-user-text: #1a0f00;
        }

        /* 画面全体を使用するためのリセット */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        body {
            font-family: "Georgia", "Times New Roman", "Hiragino Mincho ProN", serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM4YjZiM2UiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIwVjIwek0wIDIwaDIwdjIwSDBWMjB6bTIwLTExMGgxMHYxMEgyMFAwem0xMCAwSDB2MTBIMDBWMHoiLz48L3nPjwvZz48L3N2Zz4=');
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            /* iOSのツールバー対策 */
            height: 100dvh; 
            position: relative;
        }

        /* ヘッダー：画面端まで広げる */
        header {
            background: linear-gradient(#4b3421, #2b1d12);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px double var(--disney-gold);
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
        }

        /* スマホ向けタイトル短縮 */
        @media (max-width: 600px) {
            header { padding: 10px 15px; }
            header h1 { font-size: 16px; }
            header h1 span { display: none; }
            header h1::before { content: 'Disney BGS'; }
        }

        .mode-toggle {
            background-color: transparent;
            color: var(--disney-gold);
            border: 2px solid var(--disney-gold);
            padding: 8px 18px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            font-family: serif;
        }
        .mode-toggle:hover {
            background: var(--disney-gold);
            color: #fff;
        }

        /* メインビュー：中央寄せを解除し、画面幅を最大限活用 */
        #chat-view {
            flex: 1;
            overflow-y: auto;
            padding: 30px 5%;
            background-color: var(--panel-color);
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI5MCIgaGVpZ2h0PSI5MCIgdmlld0JveD0iMCAwIDkwIDkwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNkMWI3OGMiIGZpbGwtb3BhY2l0eT0iMC4wNyI+PHBhdGggZD0iTTAgMGg5MHY5MEgwVjB6bTQ1IDQ1YjUgNSAwIDEgMSAxMCAwIDUgNSAwIDAgMS-xMCAwek0wIDkwaDkwdjkwSDBVOTB6bTQ1IDQ1YjUgNSAwIDEgMSAxMCAwIDUgNSAwIDAgMS-xMCAwek05MCAwaDkwdjkwSDkwVjB6bTQ1IDQ1YjUgNSAwIDEgMSAxMCAwIDUgNSAwIDAgMS-xMCAwek05MCA5MGg5MHY5MEg5MFY5MHptNDUgNDViYSA1IDAgMSAxIDEwIDAgNSA1IDAgMCAxLTEwIDB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            -webkit-overflow-scrolling: touch;
        }

        #chat-log {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            /* PCでは少し中央に寄せて読みやすく、スマホではフル幅 */
            max-width: 1000px;
            margin: 0 auto;
        }

        .bubble {
            max-width: 85%;
            padding: 20px;
            font-size: 15px;
            line-height: 1.8;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            border: 1px solid #5d4037;
            position: relative;
        }

        @media (max-width: 600px) {
            .bubble { max-width: 95%; font-size: 14px; padding: 15px; }
        }

        .bot {
            align-self: flex-start;
            background-color: var(--bubble-bot);
            color: var(--bubble-bot-text);
            border-radius: 15px 15px 15px 5px;
        }

        .user {
            align-self: flex-end;
            background-color: var(--bubble-user);
            color: var(--bubble-user-text);
            border-radius: 15px 15px 5px 15px;
        }

        .story-title {
            display: block;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            border-bottom: 2px solid var(--disney-gold-dark);
            padding-bottom: 5px;
        }

        /* 編集パネル：PCでは右から、スマホでは全画面 */
        #edit-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 500px;
            max-width: 100%;
            height: 100vh;
            height: 100dvh;
            background-color: var(--bubble-bot);
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDgwIDgwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNkMWI3OGMiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg4MHY4MEgwVjB6bTQwIDQwYjUgNSAwIDEgMSAxMCAwIDUgNSAwIDAgMS-xMCAwek0wIDgwaDgwVjg4SDBVODB6bTQwIDQwYjUgNSAwIDEgMSAxMCAwIDUgNSAwIDAgMS-xMCAwek04MCAwaDgwdjg4SDgwVjh6bTQwIDQwYjUgNSAwIDEgMSAxMCAwIDUgNSAwIDAgMS-xMCAwek04MCA4MGg4MHY4OEhxMFY4MHptNDAgNDViYSA1IDAgMSAxIDEwIDAgNSA1IDAgMCAxLTEwIDB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            border-left: 3px double var(--disney-gold);
            transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
            padding: 40px 25px;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 200;
            box-shadow: -15px 0 40px rgba(0,0,0,0.8);
        }

        #edit-overlay.open { right: 0; }

        /* フッター：画面端まで広げる */
        footer {
            background: linear-gradient(#2b1d12, #4b3421);
            padding: 20px;
            border-top: 3px double var(--disney-gold);
            flex-shrink: 0;
        }

        .input-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
        }

        #user-input {
            flex: 1;
            border: 2px solid var(--disney-gold);
            background-color: var(--bubble-bot);
            color: var(--bubble-bot-text);
            padding: 15px 25px;
            border-radius: 30px;
            outline: none;
            font-size: 16px;
            font-family: serif;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .send-btn {
            background: radial-gradient(circle, #f2e096 0%, #b59410 100%);
            border: 2px solid #7c620a;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* 編集フォーム用装飾 */
        .form-group { margin-bottom: 20px; }
        label { color: #5d4037; font-weight: 700; display: block; margin-bottom: 5px; }
        input[type="text"], textarea {
            width: 100%;
            background: rgba(255,255,255,0.4);
            border: 1px solid var(--disney-gold);
            padding: 12px;
            box-sizing: border-box;
            border-radius: 4px;
            font-family: serif;
        }
        textarea { height: 200px; }
        
        .list-item {
            padding: 12px;
            border-bottom: 1px solid rgba(139, 107, 62, 0.3);
            display: flex;
            justify-content: space-between;
            color: #332211;
        }

        /* スクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--disney-gold-dark); border-radius: 4px; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1><span>Disney Magical Library</span></h1>
        <button class="mode-toggle" onclick="toggleEditPanel()">📂 編纂</button>
    </header>

    <div id="chat-view">
        <div id="chat-log">
            <div class="bubble bot">
                <span class="story-title">Magical Archive System</span>
                Disney Magical Libraryへようこそ！アトラクションの名称や略称（タワテラ、ハニハン等）を入力してください。
            </div>
        </div>
    </div>

    <div id="edit-overlay">
        <button onclick="toggleEditPanel()" style="float:right; background:none; border:none; font-size:32px; color:#5d4037; cursor:pointer;">&times;</button>
        <h2 style="font-family:serif; color:#5d4037; border-bottom:2px solid #c19b67; padding-bottom:10px;">アーカイブ編纂</h2>
        
        <div class="form-group">
            <label>正式名称</label>
            <input type="text" id="edit-title" placeholder="例: タワー・オブ・テラー">
        </div>
        
        <div class="form-group">
            <label>略称・キーワード（カンマ区切り）</label>
            <input type="text" id="edit-aliases" placeholder="例: タワテラ,TOT">
        </div>
        
        <div class="form-group">
            <label>解説文 (Story & Trivia)</label>
            <textarea id="edit-content" placeholder="物語を綴ってください..."></textarea>
        </div>
        
        <button onclick="saveData()" style="width:100%; padding:18px; background:var(--disney-gold-dark); color:#fff; border:none; font-weight:700; cursor:pointer; border-radius:4px;">図書館に記録する</button>

        <div id="data-list-container" style="margin-top:30px;">
            <p style="font-size:12px; font-weight:700; color:#5d4037;">登録済みアーカイブ</p>
            <div id="data-list"></div>
        </div>
        
        <button onclick="resetDefault()" style="margin-top:50px; font-size:10px; background:none; border:none; width:100%; color:#8b6b3e; cursor:pointer;">初期データベースへリセット</button>
    </div>

    <footer>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="キーワードを入力..." autocomplete="off">
            <button class="send-btn" onclick="ask()">🔍</button>
        </div>
    </footer>
</div>

<script>
    // データベース（500項目超の統合版を維持）
    const defaultData = {
        "content": {
            "タワー・オブ・テラー": "【BGS】1912年のNY。ホテル・ハイタワーのオーナー、ハリソン・ハイタワー三世は強欲な収集家。1899年12月31日、コンゴで強奪した偶像『シリキ・ウトゥンドゥ』の呪いを侮辱し、エレベーターで失踪。現在はNY市保存協会が「歴史的価値」としてツアーを主催。シリキの目は、彼を侮辱した者にだけ緑色に光る。エレベーターのワイヤーは実は切れておらず、シリキの魔法で落とされている。",
            "インディ・ジョーンズ": "【BGS】ユカタン半島の「クリスタルスカルの魔宮」。インディ博士の助手パコが「若さの泉」を探すツアーを無許可で企画。魔宮の守護神クリスタルスカルは侵入者に激怒し、火の玉、毒矢、巨大な岩で攻撃する。インディ博士は車に乗り移るなど、ゲストを逃がすために奮闘。実はパコは入り口でビデオ解説をしている男で、彼が持っている地図は宣伝用のチラシである。",
            "ソアリン：ファンタスティック・フライト": "【BGS】空を飛ぶ夢を追い続けた女性カメリア・ファルコ。彼女が所属した探検家・冒険家学会『S.E.A.』。その博物館にて、カメリアのスピリットが具現化したドリームフライヤーに乗り世界を巡る。日本版のラストはメディテレーニアンハーバーの上空へ帰還。これは日本独自の特別映像。Qラインには彼女の偉業を称える肖像画や、世界中の飛行の歴史が展示されている。",
            "センター・オブ・ジ・アース": "【BGS】地学の天才ネモ船長が発見した地底世界。地熱エネルギーを抽出する削岩機、水晶の森、巨大キノコの森。しかし突然の火山活動活発化により、コースを外れ、巨大生物ラーバモンスターが潜むエリアへ。最後は蒸気爆発（火山噴火）の勢いで、プロメテウス火山の山腹から時速75kmで射出される。テラベーターの気圧差まで再現されている。",
            "スプラッシュ・マウンテン": "【BGS】うさぎどん（ブレアラビット）が「笑いの国」を探して旅に出る。狡賢いブレアフォックスとブレアベアが彼を捕まえようとするが、最後はうさぎどんが「いばらの茂みにだけは投げないでくれ！」と逆心理を使い、滝（茂み）へ投げ込まれて脱出に成功。落下後の水飛沫は、彼の喜びの表現でもある。ラケッティの酒密造機爆発がこの山の誕生のきっかけ。",
            "ビッグサンダー・マウンテン": "【BGS】ゴールドラッシュが去った「ビッグサンダー・マイニング・カンパニー」。聖なる山を荒らしたため、精霊の怒り（セドナの呪い）で落盤事故が多発し、現在は機関士のいない列車が勝手に暴走中。コース途中のヤギ（ビリー）はダイナマイトを食べており、彼の爆発が列車の加速に繋がっている設定。山頂付近には、かつての金鉱掘りたちのキャンプ跡がある。",
            "ホーンテッドマンション": "【BGS】18世紀のゴシック様式の屋敷。主人はマスター・グレイシー。999人の幽霊たちが、1000人目の仲間を探している。屋根の飾りはチェスの駒。晩餐会のシーンでは、ゴーストライターや決闘する幽霊たちが現れる。有名な「伸びる部屋」は、TDLでは天井が上がっており、実際には地下に潜っていない。花嫁コンスタンスの心臓の鼓動が聞こえる屋根裏部屋は必見。",
            "プーさんのハニーハント": "【BGS】100エーカーの森。クリストファー・ロビンの絵本の中。ハニーポットは電磁誘導で走り、3台1組。実は「蜂蜜の嵐」のシーンで蜂蜜を吸い込む大砲を食らうのは、3台のうち1台だけ。また、プーさんの夢「ズオウとヒイタチ」のシーンでは、車両ごとに全く違う動きをするようにプログラムされている。最後に蜂蜜の香りが漂う演出がある。",
            "スペース・マウンテン": "【BGS】宇宙ステーションから出発する、未知の銀河旅行。エネルギーを充填したロケットで銀河へ。2027年に向けた建て替えが決まっており、現在の「クラシックな未来感」は今のうちにしか味わえない。途中で見える星雲は「スペースダスト」。実は走行中の最高速度は49km/hと意外に控えめだが、暗闇と特殊効果で体感速度が劇的に上がるよう設計されている。",
            "美女と野獣“魔法のものがたり”": "【BGS】映画の名シーンをティーカップ型のライドで体験。Qラインのお城は「雪に閉ざされた状態」から始まり、内部には朝食を食べるテーブルや、野獣が引き裂いた肖像画が。最新のアニマトロニクスは、毛の質感や瞬きのタイミングまで徹底計算. ラストのダンスシーンは, 全自動車両がシンクロして踊り, ゲストも物語の一部となる.",
            "アナとエルサのフローズンジャーニー": "【BGS】アナ雪の後の物語. エルサが「雪の門」をゲストに開き, アナとの愛の軌跡を振り返る. 映画の楽曲がフルで使用され, 後方に下がるボートの動きは「エルサの魔法による氷の滑走」を表現. 最新のアニマトロニクスにより, キャラクターの表情が極めて豊かで, 本当に生きているかのように見える. アレンデール王国の祝祭がテーマ.",
            "ラプンツェルのランタンフェスティバル": "【BGS】一年に一度, ラプンツェルの誕生日に上がるランタンを見るためにボートで旅をする. 塔の窓から歌う彼女や, ユージーンとボートに乗る名シーンを再現. 水面に映る数千のランタンは, 光の屈折と反射を利用した演出. ファンタジースプリングス内でも屈指の没入感を誇るロマンチックなボートライド. 夜の風景が最も美しく見えるよう設計されている.",
            "ピーターパンのネバーランドアドベンチャー": "【BGS】ロストキッズの一員となったゲストが, ピーターパンやティンカーベルと共にジョンを救いに行く. 3Dメガネを使用し, ボートが空へ浮き上がる感覚を最新のライドシステムで再現. フック船長との海賊船での決闘シーンは, 実物大の船体とスクリーンの融合により圧倒的な迫力を持つ. ティンカーベルのピクシーダストで船が空を飛ぶ.",
            "カリブの海賊": "【BGS】映画『パイレーツ・オブ・カリビアン』の要素を追加. ジャック・スパロウ, バルボッサ, デイヴィ・ジョーンズが登場. 冒頭の骸骨は「デッドマンズ・コーヴ」で永遠の眠りにつく海賊たち. 町が焼かれるシーンでは, 炎の演出に本物の光ファイバーを使用しており, 消防署から「火事」と間違われないよう許可を得ている. ウォルト・ディズニーが最後に手掛けた傑作.",
            "スター・ツアーズ": "【BGS】宇宙旅行会社「スター・ツアーズ」. C-3POが手違いでパイロットになり, ゲストを乗せたスタースピーダー1000を発進させてしまう. 反乱軍のスパイがゲストの中に紛れ込んでいることが発覚し, 帝国軍との戦いに. 全54通りの組み合わせ. 最新映画のキャラクターも随時追加され, 訪れるたびに異なる惑星へ旅することができる.",
            "海底2万マイル": "【BGS】ネモ船長が開発した小型潜水艇で, アトランティスを探す旅. サーチライトを自分で操作できる. 潜水中に窓をじっと見ると巨大イカの目が!🐙 実は潜水中に見えるのは本物の水ではなく, 二重構造の窓の間に水を満たし, 気泡を出すことで「水中」を演出している視覚マジック. 最後に出会う海底人は, 私たちを助けてくれる知的な存在.",
            "シンドバッド・ストーリーブック・ヴォヤッジ": "【BGS】シンドバッドと相棒のチャンドゥの冒険.「心のコンパス」を信じて, 本当の宝物を探す旅. 作曲はアラン・メンケン. かつてはもっと怖い内容だったが, 現在は「友達が宝物」という温かいテーマ. チャンドゥは世界中でTDSにしかいないキャラ. バナナの香りがするシーンはファンの間で有名. 心のコンパスに従えば道は開ける.",
            "トイ・ストーリー・マニア!": "【BGS】アンディのベッドの下. ゲストがオモチャサイズになり, ウッディの巨大な口から中へ. 3Dメガネをかけ, 紐を引いて卵を投げたり輪投げをしたりする. 実は待ち列の壁紙にはアンディの成長の記録や, 映画に登場した隠しアイテムが多数描かれている. おもちゃの世界に入り込んだ感覚を徹底的に追求したライド.",
            "タートル・トーク": "【BGS】S.S.コロンビア号の船尾にある展望室. ハイドロフォン(水中電話)を使って, ウミガメのクラッシュとリアルタイムで会話ができる. クラッシュのアドリブ能力は凄まじく, ゲストの持ち物を「クジラ(スマホ)」や「甲羅(リュック)」と呼ぶなど, 独自の海用語を使いこなす. 最高にエキサイティングな海の仲間との対話.",
            "ビーバーブラザーズのカヌー探険": "【BGS】スプラッシュ・マウンテンを「水浸し」にした原因であるダムの決壊. そのダムを造ったビーバーの兄弟が, 壊れたダムの木材を再利用してカヌー事業を始めた. キャストとゲストが力を合わせないと進まない, パーク内で最も「人力」が必要なアトラクション. 開拓時代の川の生活を間近で体験できる.",
            "蒸気船マークトウェイン号": "【BGS】「水上の宮殿」. 実は本物の蒸気機関で動いており, 千葉県から「船舶」としての登録を受けている. 夜になると数百個の電球が灯り, 幻想的な姿に. 3階デッキからはウエスタンランドの全景が見渡せる. 航行中, 河沿いでキャンプしている先住民や動物たちの生活を垣間見ることができる優雅な航海.",
            "ストームライダー (跡地解説)": "【BGS】かつてポートディスカバリーにあった, 巨大台風を爆破する飛行機. キャプテン・デイビスは指示を無視しがちな性格. 最後は気象観測用ミサイル「ストームディフューザー」を爆発させて台風を消滅させる. 現在はシーライダーへと技術が継承された設定. この施設の技術が, 今のポートディスカバリーの平和を守っている.",
            "S.E.A. (探検家冒険家学会)": "【BGS】Society of Explorers and Adventurers. レオナルド・ダ・ヴィンチを創設者とし, ハイタワー三世, カメリア・ファルコ, ネモ船長, ハリソン・ハイタワー, インディの友人などが所属. パーク全体(ソアリン, タワーオブテラー, フォートレス等)を繋ぐ巨大な裏設定組織. メンバーはそれぞれ独自の紋章を持っている.",
            "シンデレラ城のモザイク壁画": "【BGS】城内の通路にある5枚の壁画. イタリアの職人が手作業でタイルをはめ込んだ. 実は登場人物のイヤリングには「本物のダイヤモンド」が, 背景には「本物のサファイア」が埋め込まれている. また壁画の中の女性の一人に触れると, 幸せになれるというジンクスがあり, 多くのゲストが触れる神聖な場所.",
            "プロメテウス火山の地層": "【BGS】地質学者が「本物の火山の地層」を研究して作られた. 特定の場所には「貝の化石」が埋まっており, かつてそこが海底だったことを示唆. 内部のトンネルの削り跡は, 当時のツルハシの跡まで再現. ネモ船長の削岩機(ドリリング・マシン)が岩を貫いた跡も見ることができ, 細部まで物語が息づいている.",
            "アクアスフィア": "【BGS】水の噴射だけで直径数メートルの球体を浮かせる流体工学の結晶. 夜は球体の中のライトが点灯し, 宇宙から見た地球のように. 回転速度は, 地球の自転よりもかなり速く, 躍動感を演出. ディズニーシーの入り口に位置し, 水から生まれた命と世界の繋がりを象徴する, パークのグランドアイコン.",
            "オムニバス":"【BGS】20世紀初頭の古き良きアメリカ.メインストリートUSA（ワールドバザール）に自動車という最新技術が普及し始めた活気あふれる時代を象徴する乗り物です.ニューヨーク市営交通局が,街の美しい景観をゲストに案内するために走らせている.",
　　　　　　　"ペニーアーケード":"【BGS】電灯が普及し始めたばかりの19世紀末から20世紀初頭のアメリカ.当時の人々が仕事帰りに1ペニーを握りしめ,手軽に楽しんだ娯楽施設を再現しています.店内にある野球ゲームや占い機,木製のピンボールなどは,当時の雰囲気をそのままに,ゲストに「古き良き時代」の空気感を伝えてくれる場所.",
　　　　　　　"ウエスタンリバー鉄道":"【BGS】かつてアメリカ西部の荒野を切り拓いた蒸気機関車.この鉄道は,単に広大な大地を一周するだけでなく,神秘的な熱帯のジャングルや開拓者たちの生活,そしてついには時を遡り,巨大な恐竜たちが支配する太古の世界へとゲストを誘います.ミシシッピ川沿いの風景から,人類の歴史を越えた未知の領域までを繋ぐ,ロマンあふれる鉄路の物語.",
　　　　　　　"ジャングルクルーズ：ワイルドライフ・エクスペディション":"【BGS】世界中のジャングルを熟知した「ジャングル・ナビゲーション・カンパニー」が運営する,スリルと笑いに満ちた探検旅行です.ゲストが乗り込むボートは,かつて荷物運搬に使われていたものを改良したもので,個性豊かなスキッパー（船長）が,野生動物たちの生態やジャングルの驚異をガイドしてくれます.伝説の「象の鼻の滝」や、呪術師サムの怪しげな商売,そして神秘に包まれた古代神殿など,一歩足を踏み入れるごとに新しい発見が待っています.",
　　　　　　　"スイスファミリー・ツリーハウス":"【BGS】ディズニー映画『スイスファミリー・ロビンソン』の世界を再現したこの場所は、無人島に漂着した一家が,ジャングルの資材を活かして築き上げた驚異の拠点です.高さ約19メートルの巨大な「ロビンソン・ツリー」には、水車で汲み上げた水が流れる台所や,星空を眺めるための寝室など,過酷な環境を豊かな暮らしに変える家族の絆と冒険心が刻まれています.",
　　　　　　　"魅惑のチキルーム：スティッチ・プレゼンツ“アロハ・エ・コモ・マイ！”":"【BGS】ポリネシアの神々「チキ」が鎮座するこの場所は、古くから鳥たちが美しい歌声を披露する聖なる部屋です.ハワイの言葉で「ようこそ,我が家へ」を意味する「アロハ・エ・コモ・マイ」の精神でゲストを迎え入れますが,いたずら好きのスティッチが紛れ込んだことで,伝統的なコンサートは一変.伝説の神々を驚かせながらも,最後には「オハナ（家族）」としての絆を感じさせる,南国のリズムに溢れた物語が展開されます.",
　　　　　　　"ウエスタンランド・シューティングギャラリー":"【BGS】西部開拓時代、フロンティアスピリットに燃える開拓者や保安官たちが、自らの身を守り、正義を貫くために腕を磨いた場所です。伝説のガンマンを志すゲストは、ライフルを手に取り、酒場の喧騒の中で的を狙います。見事命中の印を手に入れれば、この街の一流のガンマンとして認められた証。古き良き西部の空気が漂う中、スリルと名誉をかけた挑戦が繰り広げられます。", 
            "カントリーベア・シアター":"【BGS】19世紀後半、音楽を愛するクマたちが自分たちの音楽堂として建てた「グリズリー・ホール」。そこでは、伝説のプロデューサーであるヘンリーを筆頭に、カントリー＆ウエスタンを愛するクマたちが、恋や旅、そして故郷を想う心を歌に乗せて届けています。壁に飾られた肖像画や楽屋の雰囲気からは、彼らが長年この地で音楽と共に歩んできた歴史と、家族のような深い絆を感じることができます。",
            "トムソーヤ島いかだ":"【BGS】19世紀のアメリカ、マーク・トウェインの名作『トム・ソーヤの冒険』の世界が目の前に広がります。開拓時代の荒削りな丸太を組み上げた「いかだ」に乗り込み、トムとハックが名付けた「トムソーヤ島」へ。対岸の喧騒を離れ、インジャンジョーの洞窟やハーパーの隠れ家が待つ、子供たちの夢と冒険心が詰まった聖域へと足を踏み入れるためのプロローグです。",
            "アリスのティーパーティー":"【BGS】ディズニー映画『ふしぎの国のアリス』の名シーンを再現したこの場所では、365日のうち364日ある「なんでもない日（Unbirthday）」を盛大にお祝いしています。カラフルなティーカップに乗り込めば、中央の巨大なティーポットからは眠りネズみのドーマウスが顔を出し、ゲストを不思議なリズムの世界へと誘います。ルールも常識も通用しない、ハッピーで奇妙なお茶会の物語です。",
            "イッツ・ア・スモールワールド":"【BGS】1964年のニューヨーク世界博覧会で誕生したこの場所は、「平和への願い」が込められた特別な贈り物です。ヨーロッパからアジア、アフリカ、中南米、そして南太平洋の島々まで、民族衣装をまとった子どもたちが手を取り合い、共通のメロディを口ずさみます。2018年のリニューアルを経て、ディズニー映画の仲間たちもそれぞれの故郷でゲストを温かく迎え入れ、国境を越えた「ひとつの家族」であることを教えてくれる物語です。",
            "キャッスルカルーセル":"【BGS】おとぎの国の王宮で開催される、勇壮で美しい騎馬行進を再現しています。一頭一頭異なる装飾が施された白馬たちは、かつて戦場を駆けた名馬や、姫君を乗せた気品ある駿馬たち。ゲストがその背にまたがれば、中世ヨーロッパの騎士道精神あふれる時代へとタイムスリップし、シンデレラの物語を祝う宮廷の華やかな宴の一部となることができます。",
            "白雪姫と七人の小人":"【BGS】ディズニー映画『白雪姫』の世界を再現したこのアトラクションは、実は「白雪姫自身」がどのような恐怖や驚きを感じていたかを追体験する構造になっています。ゲストは木彫りのトロッコに乗り込み、平和な小人たちの家を離れ、毒リンゴを差し出す魔女の執拗な追跡を逃れて進みます。光り輝く宝石の鉱山から、雷鳴が轟く嵐の崖へと続く、光と闇が交錯するスリリングな冒険の旅です。",
            "シンデレラのフェアリーテイル・ホール":"【BGS】魔法によって王妃となったシンデレラが、自分を支えてくれた仲間たちや、かつての自分と同じように夢を見るゲストのために整えたギャラリーです。城内には、魔法の杖が輝くシーンや、美しいドレスに変わる瞬間の絵画、そして物語の象徴である「ガラスの靴」が飾られています。ただ物語を眺めるだけでなく、ゲスト自身が魔法の力や真実の愛の輝きを体感できる、王国の優しさに満ちた場所です。",
            "空飛ぶダンボ":"【BGS】ディズニー映画『ダンボ』の世界が、華やかなファンタジーランドの空に広がります。最初は大きな耳を笑われていたダンボですが、ネズミのティモシーやカラスたちの励まし、そして「魔法の羽」の力を借りて、ついに空を飛ぶ才能を開花させました。このアトラクションは、ダンボが勇気を出して初めて空へ飛び立った瞬間の喜びを、ゲストとともに分かち合う、心温まる冒険の物語です。",
            "ピーターパン空の旅":"【BGS】ダーリング家の子供たちの部屋から、妖精の粉を浴びて窓の外へ。ロンドンの夜景を眼下に眺めながら、「右から2番目の星」を目指して進みます。到着したネバーランドでは、永遠に子供のままのピーターパンやフック船長率いる海賊たちとの戦いが待っています。現実の世界を忘れ、イマジネーションの翼で未知の世界を駆け巡る、時を超えた冒険の旅です。",
            "ピノキオの冒険旅行":"【BGS】イタリアの小さな町。ゼペットじいさんの手で作られたピノキオが、ブルー・フェアリーに命を吹き込まれ、良心の象徴であるジミニークリケットとともに学校へ向かいます。しかし、ずる賢い正直ジョンやギデオンの誘惑により、恐ろしいプレジャー・アイランドや巨大クジラ・モンストロの胃袋の中へと迷い込んでしまいます。困難の中で勇気と優しさを証明し、星に願いを込めた家族の絆が奇跡を起こすまでの物語が、色彩豊かに描き出されます。",
            "ミッキーのフィルハーマジック":"【BGS】舞台は、ミッキーマウスが指揮を務める豪華なコンサートホール。ドナルドダックがミッキーの「ソーサラーハット（魔法使いの弟子に登場する帽子）」に手を出し、魔法を制御できなくなったことから物語は始まります。『美女と野獣』の晩餐会、『リトル・マーメイド』の海底の世界、『アラジン』の夜空の旅……。ゲストはドナルドとともに、ディズニーの名曲が彩る夢の世界を駆け巡り、音楽と魔法が一体となった最高のフィナーレを目指します。",
            "ガジェットのゴーコースター":"【BGS】ディズニー映画『チップとデールの大作戦 レスキュー・レンジャー』に登場する、発明の天才ガジェット。彼女は、捨てられた文房具やガラクタを再利用して、驚くべき装置を作るのが得意です。このコースターも、大きな「どんぐり」を車両にし、安全ピンや定規、櫛（くし）といった日用品を組み合わせて組み立てられています。トゥーンタウンのトゥーン（アニメの住人）たちのために、ガジェットの遊び心と技術が詰まった、小さくても本格的な冒険の物語です。",
            "グーフィーのペイント＆プレイハウス":"【BGS】トゥーンタウンに住むグーフィーが、自分の部屋を新しく塗り替えたいと考えました。そこで彼は、誰もが簡単にペンキ塗りができる不思議な装置を開発して、ゲストに手伝ってもらうことにしたのです。ボタンを押したり、ハンドルを回したりしてペンキを放てば、部屋の中はあっという間にカラフルな色彩でいっぱいに。グーフィーらしい、おっちょこちょいだけど温かみのある、創造力あふれるリフォーム大作戦の物語です。",
            "チップとデールのツリーハウス":"【BGS】トゥーンタウンの端に立つこの巨木は、いたずら好きのチップとデールが自分たちの手で作り上げた、快適でちょっと騒がしいマイホームです。階段を上って家の中に入れば、彼らが冬に備えて集めた大量のドングリや、せっせと働くための道具たちが並んでいます。身体の小さな彼らに合わせたサイズ感や、遊び心たっぷりの内装からは、二人の仲の良さと、いつも何かを企んでいるような活発な日常が伝わってきます。",
            "トゥーンパーク":"【BGS】トゥーンタウンの住人たちが集うこの公園は、ミッキーマウスが街の子供たちのために、誰でも自由に、そして安全に遊べるようにとプレゼントした場所です。並んでいるのは、普通の公園にあるような固定された遊具ではなく、まるでアニメーションから飛び出してきたかのような、柔らかくてカラフルな動物たちの彫刻。子供たちはその背中に乗ったり、穴をくぐり抜けたりして、五感を使ってトゥーンの世界を体験することができます。",
            "ドナルドのボート":"【BGS】ドナルドが愛してやまない恋人デイジーダックの名前を冠した、この「ミス・デイジー号」。一見、普通の船に見えますが、そこはトゥーンタウン。船を操縦するためのレバーを引けば汽笛が鳴り響き、コントロールパネルを操作すれば不思議な音が飛び出す、ドナルドらしい賑やかな仕掛けが満載です。船内にはドナルドの服や写真が飾られており、彼がこの場所でデイジーへの愛を育みながら、楽しく暮らしている様子が伝わってきます。",
            "ミニーの家":"【BGS】ミニーの家は、彼女の優しさとセンスが細部にまで散りばめられた、トゥーンタウンで最もスウィートな場所です。玄関をくぐると、思い出の詰まった写真や、ミッキーからの手紙が飾られています。特にキッチンはミニーのお気に入りで、オーブンでケーキが焼き上がる様子が見られたり、冷蔵庫を開けるとひんやりとした風を感じられたりと、まるですぐそこにミニーがいるかのような温かさに包まれています。",
            "ロジャーラビットのカートゥーンスピン":"【BGS】トゥーンタウンの少し怪しげな裏通り。悪党のイタチたちが、トゥーンを溶かしてしまう恐ろしい液体「ディップ」を使って街を混乱に陥れようとしています。ゲストは、意志を持つタクシーのレニーに乗り込み、ロジャーラビットを助けるためにディップを避けながら街中をスピンして進みます。爆発する工場や、重力がめちゃくちゃになった部屋など、アニメーションの世界ならではの「なんでもあり」な大騒動に巻き込まれるスリリングな物語です。",
            "スター・ツアーズ：ザ・アドベンチャーズ・コンティニュー":"【BGS】銀河旅行会社「スター・ツアーズ」による平和な宇宙観光ツアー……のはずが、ひょんなことから反乱軍のスパイを運ぶ任務に巻き込まれてしまいます。行き先は砂漠の惑星タトゥイーンや氷の惑星ホス、さらには建設中のデス・スターなど、毎回どこへたどり着くかわかりません。50通り以上の組み合わせがある物語の分岐によって、乗るたびに新しい登場人物やスリリングな冒険に出会える、没入感あふれるスペースアドベンチャーです。",
            "「スティッチ・エンカウンター":"【BGS】銀河連邦が、地球のハワイにいるスティッチの様子を見守るために設置したこの施設。ゲストは巨大なスクリーンを通じて、宇宙を旅するスティッチと直接おしゃべりしたり、一緒にゲームをしたりすることができます。スティッチは好奇心旺盛で、時にゲストを驚かせたり、ユーモアたっぷりのジョークを飛ばしたりと、その場の状況に合わせて予測不能な反応を見せます。宇宙を越えた絆を感じられる、心温まる交流の物語です。",
            "ベイマックスのハッピーライド":"【BGS】若き発明家ヒロ・ハマダが、ケア・ロボットのベイマックスから「心の健康のためには、楽しくてハッピーな体験が必要だ」と教わり、ゲストのために作り上げたこの場所。一度音楽が鳴り響けば、ベイマックスたちはゲストが乗ったカートを縦横無尽に、時には鋭く、時には軽快に引っ張り回します。ただ乗るだけでなく、待機列から周囲のゲストまでが一体となって踊り出し、会場全体がポジティブなエネルギーに包まれる、まさに「ハッピー」を体現する物語です。",
            "モンスターズ・インク“ライド＆ゴーシーク！”":"【BGS】モンスターシティにある「モンスターズ・インク」の社内は、今日も笑いエネルギーでいっぱい。そんな中、マイクやサリーは人間の女の子ブーを招待して、特別な「かくれんぼ」を始めました。ゲストはセキュリティトラムに乗り込み、手元のフラッシュライトを使って、ロッカーの中、デスクの下、さらには街のあちこちに隠れているモンスターたちを次々と探し出していきます。誰がどこに隠れているのか、光を当てるまでわからないワクワク感に満ちた物語です。",
            "バズ・ライトイヤーのアストロブラスター":"【BGS】ディズニー＆ピクサー映画『トイ・ストーリー』のバズ・ライトイヤーが率いる、精鋭チーム「ユニバース・プロテクション・ユニット」。ゲストは新米のスペースレンジャーとして、最新型の宇宙船「スペースクルーザー」を操縦し、ザーグが送り込んだロボット軍団を撃退する任務に就きます。ターゲット（Zマーク）を狙って引き金を引き、ポイントを獲得して最高ランクの「ギャラクティック・ヒーロー」を目指しましょう。2024年にクローズ。",
            "ワールドバザール":"【BGS】東京ディズニーランドの玄関口に広がるこのエリアは、ウォルト・ディズニーの故郷、ミズーリ州マーセリンの街並みがモデルになっています。懐かしくも活気あふれるビクトリア朝様式の建物が並び、ショップやレストランからは楽しげな音楽や甘い香りが漂います。ここは単なる通路ではなく、現実の世界から夢と魔法の世界へと心を切り替えるための、壮大なプロローグの舞台なのです。",
            "トゥモローランド":"【BGS】ここは、かつて人々が夢見た「未来の姿」と、現代の科学が描き出す「宇宙の神秘」が融合した場所です。壮大な宇宙の旅へと誘う「スペース・マウンテン」を中心に、銀河を駆けるスター・ツアーズや、愉快なエイリアンとの交流など、地球の枠を飛び越えた体験がゲストを待ち受けています。常に進化を続けるこのエリアは、私たちに「未来は無限の可能性に満ちている」という希望を届けてくれる、夢のタイムトラベルの舞台です。",
            "トゥーンタウン":"【BGS】ここは、ギャグとユーモアが法律の「トゥーン（アニメーションの住人）」たちが暮らす特別な街です。建物はどれもゆがんだり膨らんだりして息づいており、マンホールの蓋がしゃべったり、消火栓から水が噴き出したりと、日常の常識は通用しません。ミッキーたちの家が並ぶ「ミッキーの街」から、にぎやかな商店街や市役所がある「ダウンタウン」まで、一歩足を踏み入れれば、あなたもアニメーションの一員として魔法のような一日を過ごすことができます。",
            "ファンタジーランド":"【BGS】シンデレラ城をくぐり抜けた先に広がるのは、誰もが一度は憧れたおとぎの国。白雪姫やピーターパン、空飛ぶダンボなど、世代を超えて愛される物語がすぐそばに息づいています。ヨーロッパの古い町並みのような美しさと、魔法の力が作り出す不思議な現象が共存するこのエリアは、東京ディズニーランドの「心（ハート）」とも言える場所。勇気ある冒険や真実の愛、そして信じる心の素晴らしさを教えてくれる、永遠に色あせない物語の舞台です。",
            "クリッターカントリー":"【BGS】かつて人間が文明を築こうとしたこの地は、ある大事件をきっかけに、知恵の働く小さな動物（クリッター）たちの楽園となりました。そびえ立つチカピンヒル（いばらの山）の周囲には、アライグマのラケッティが営むお店や、ビーバーのブラザーズが作ったダムなどが点在し、彼らの暮らしの息吹が感じられます。水しぶきを上げる丸太のボートや、ゆったりと進むカヌーなど、水辺の冒険と動物たちのユーモアが心地よく調和した、温かみのある物語の舞台です。",
            "ウエスタンランド":"【BGS】赤土の岩山と木造の建物が並ぶこの場所は、自由と冒険を求めて西へ向かった開拓者たちの熱気で満ちています。雄大なアメリカ河を中心に、カウボーイたちが集うサルーンや、腕自慢が通う射撃場など、当時の荒々しくも活気ある生活が細部まで再現されています。風に乗って聞こえてくるカントリーミュージックや、どこからか漂うスパイスの効いた料理の香りが、あなたを瞬時にゴールドラッシュに沸く開拓時代へとタイムスリップさせてくれる、冒険と開拓の物語です。",
            "アドベンチャーランド":"【BGS】一歩足を踏み入れれば、そこは鬱蒼と茂る木々と野生動物の鳴き声が響く、神秘に包まれた世界。陽気な船長とジャングルを巡るリサーチ探検、ツリーハウスで過ごす素朴な生活、そして暗闇の海で繰り広げられる海賊たちの戦いなど、ここには日常を忘れさせる非日常の冒険が待っています。スリルだけでなく、南国の花々や古い神殿、優雅なコロニアル様式の建物が共存する、多文化でエネルギッシュな物語の舞台です。",
            "東京ディズニーランド":"【BGS】1983年に開園した、日本初のディズニーのテーマパーク。『夢と魔法の王国』を舞台に、7つのテーマランドで構成される、永遠に完成することのない魔法の世界。一歩足を踏み入れれば、そこはゲスト一人ひとりが物語の主人公になれる場所。時代や国境を越えた冒険、おとぎ話の魔法、そして未来への希望が、最新のテクノロジーと温かなホスピタリティによって見事に調和しています。訪れるたびに新しい発見があり、子供も大人も関係なく、心から「魔法」を信じることができる特別な物語の舞台です。",
            "東京ディズニーシー":"【BGS】2001年に開園した、世界で唯一『海』をテーマにしたディズニーパーク。7つの『ポートディスカバリー（テーマポート）』を巡り、時空を超えたロマンと冒険、そしてイマジネーションの世界を旅する物語が広がっています。「冒険とイマジネーションの海」を掲げるこのパークは、東京ディズニーランドとはまた異なる、少し大人びた情緒と圧倒的なスケールの物語に包まれています。中央にそびえるプロメテウス火山の雄大な姿、ヴェネツィアの運河、神秘的な失われた古代文明の遺跡……。それぞれの港には、独自の歴史と文化、そしてそこで暮らす人々（あるいは精霊や冒険家たち）の息吹が細部まで作り込まれています。海を通じてつながる世界を旅しながら、心揺さぶられる壮大な物語の一部になれる、特別な場所です。",
            "ディズニーシー・トランジットスチーマーライン":"【BGS】冒険家や開拓者、そして旅人たちで賑わう東京ディズニーシーの海。ゲストは、19世紀から20世紀初頭にかけて活躍したような重厚な蒸気船に乗り込み、水上の旅へと出発します。メディテレーニアンハーバーの優雅な運河を抜け、プロメテウス火山の麓を通り、時を超えてロストリバーデルタのジャングルへと至るその航路は、まさに世界を旅しているような高揚感を与えてくれます。日中の爽やかな風を感じる旅も、灯火が水面に揺れるロマンチックな夜の航海も、それぞれに異なる物語を感じさせてくれる特別な体験です。",
            "「フォートレス・エクスプロレーション":"【BGS】メディテレーニアンハーバーにそびえる要塞「フォートレス」は、探検家や冒険家たちの学会『S.E.A.（Society of Explorers and Adventurers）』の拠点です。ゲストは迷路のような回廊を抜け、レオナルド・ダ・ヴィンチの飛行マシンや、星々の動きを示す巨大な太陽系儀、地球の自転を証明する「フーコーの振り子」など、知的好奇心を刺激する展示の数々を自由に探索できます。さらに、黄金のガリオン船「ルネサンス号」に乗り込み、キャノン砲を操作したり、船長室を覗いたりと、大航海時代のロマンに満ちた物語を体感できる場所です。",
            "ヴェネツィアン・ゴンドラ":"【BGS】メディテレーニアンハーバーの一角、パラッツォ・カナル（宮殿の運河）から出発するこの旅。ゲストは美しい装飾が施されたゴンドラに乗り込み、歴史を感じさせる橋の下をくぐり抜け、広大な海へと漕ぎ出します。ゴンドリエたちが語る街の歴史や願い事の伝説、そして水面に響き渡る美しいカンツォーネは、ここが日本であることを忘れさせ、まるで本物のヴェネツィアに迷い込んだかのような錯覚を与えてくれます。日常の喧騒を離れ、水の都のゆったりとした時の流れに身を任せる、至福の物語です。",
            "ザ・レオナルドチャレンジ":"【BGS】フォートレス（要塞）の中に一歩足を踏み入れれば、そこは知恵と勇気が試される場所。ゲストは「S.E.A.」の新入会員候補として、ダ・ヴィンチが遺した数々の謎に挑みます。渡された地図に記されたヒントを頼りに、溶岩が流れる洞窟や天文学の部屋、そして要塞の屋上などを探索。自らの手で仕掛けを動かし、すべての謎を解いた者だけが、学会の秘密に触れることができます。自分の足で歩き、観察し、発見する喜びを体感できる、知的な冒険の物語です。",
            "ディズニーシー・エレクトリックレールウェイ":"【BGS】ポートディスカバリーへ向かう赤い電動式レールウェイは、都市の発展と未来への期待を象徴する乗り物です。アメリカンウォーターフロントの賑やかな通りを眼下に見下ろしながら出発し、車窓からは雄大なプロメテウス火山や、広大な海、そして刻々と変化するパークの風景を特等席で楽しむことができます。どこか懐かしいクラシックな車体に揺られながら、最新のテクノロジーが待つ未来の港へと向かうそのひとときは、まさに「時空を超える旅」を感じさせてくれる物語の架け橋です。",
            "ビッグシティ・ヴィークル":"【BGS】自動車が普及し始めたばかりの古き良きアメリカ。ここでは、ポリスワゴンやデリバリートラック、華やかなオープンカーなど、様々な形をしたヴィークルが街の足として活躍しています。ニューヨークの喧騒を感じながら、ドライバーによるガイドとともに、路面電車や馬車が行き交う通りを優雅に進みます。ただの移動手段ではなく、当時の最新技術であった「エンジン」の音や振動を感じながら、発展し続ける大都市の物語を肌で感じることができる体験です。",
            "アクアトピア":"【BGS】ポートディスカバリーにある「旧：気象コントロールセンター（新：海洋生物研究所）（CWC）」が開発した、最新の航海システムを体験できるこのアトラクション。レールがない水面上を、ヴィークルは回転したりバックしたりと、まるで意思を持っているかのように不規則に動き回ります。一見、穏やかな研究施設に見えますが、ひとたび出発すれば、突然の方向転換や水しぶきに翻弄される、エキサイティングな研究実験の旅が待っています。昼は近未来的な実験施設の活気を感じ、夜は水面に反射するライトアップが幻想的な、変化に富んだ物語の舞台です。（旧BGS）",
            "ニモ＆フレンズ・シーライダー":"【BGS】ポートディスカバリーの海洋生物研究所（CWC）が開発した、電気の力で魚のように動く特殊な素材「人工ラマニウム：チジミ二ウム」を用いた潜水艇。ゲストが乗り込むと、機体はあっという間に小さくなり、海の世界へ。ニモやドリー、タコのハンクといったおなじみの仲間たちに出会ったり、時にはちょっとしたハプニングに巻き込まれたりと、海の中で繰り広げられるドラマを五感で体験できます。映像と連動して動く座席や、ふわりと感じる水しぶきが、あなたを本当の海の一部へと誘う物語です。",
            "レイジングスピリッツ":"【BGS】中央アメリカのジャングルの奥深く、ロストリバーデルタで発見された古代遺跡。かつて発掘チームが、向かい合って立つ「火の神（イクチュアラ）」と「水の神（アクアディクト）」の石像を修復しようとした際、恐ろしい呪いによって神々の怒りが爆発しました。その強大な力は、資材を運ぶための貨車用のレールを飴細工のようにねじ曲げ、周囲には炎と水しぶきが荒れ狂っています。ゲストは暴走する貨車に乗り込み、超自然的な現象が渦巻く発掘現場を命がけで駆け抜けることになります。",
            "フェアリー・ティンカーベルのビジーバギー":"【BGS】ファンタジースプリングスにある「ピクシー・ホロウ」の住人たちは、いつも大忙し。もの作りの妖精ティンカーベルは、谷中の妖精たちへ荷物を届けるために、特別なバギーを作り出しました。ゲストは、巨大なひまわりやボタン、糸巻きなど、人間が落とした「落とし物」を妖精たちが再利用して作った愛らしいアイテムに囲まれながら、配送ルートを辿ります。春、夏、秋、冬……それぞれの季節が持つ色彩豊かな風景を通り抜け、時には妖精たちの魔法の粉「ピクシーダスト」を感じるような、温かくも賑やかな物語の旅です。",
            "キャラバンカルーセル":"【BGS】ジャスミン王女やアラジンたちが住むアグラバーの宮廷。その中庭にあるこのカルーセルは、世界でも珍しい2階建ての構造をしており、ドーム状の屋根には美しい装飾が施されています。ゲストがまたがるのは、一般的な馬だけではありません。砂漠を旅するキャラバン（商隊）に欠かせないラクダや、物語に登場する魔法の絨毯、さらには伝説の怪鳥ロックや、力強いジーニーなど、多種多様な生き物たちがあなたを待っています。夜になると何千ものライトが灯り、まるで魔法にかかったかのような幻想的な物語の世界へと誘われます。",
            "ジャスミンのフライングカーペット":"【BGS】アラビアンコーストの美しい宮殿の中庭に、色鮮やかな魔法の絨毯たちが勢ぞろいしています。ゲストは4人乗りの絨毯に乗り込み、ジャスミンの庭園にある噴水の周りを、ふわふわと自由に飛び回ります。このアトラクションの醍醐味は、座席にあるレバーを操作して、自分たちの絨毯の「高さ」や「傾き」を自由に変えられること。まるで本当に意思を持った絨毯を操っているかのような感覚で、青空の下や星空の下、エキゾチックな景色を見下ろしながら爽快な物語の旅を体験できます。",
            "マジックランプシアター":"【BGS】アラビアンコーストの活気ある広場にあるこの劇場では、かつてないマジックショーが開催されています。意地悪で傲慢なマジシャンのシャバーンは、本物の魔法使いになりたい一心で、ジーニーを箱に閉じ込めて無理やり手伝わせようとします。しかし、自由を愛するジーニーが黙っているはずもありません！飛び出す3D映像の迫力と、舞台上で繰り広げられるコミカルな演技が重なり合い、客席を巻き込んでの大騒動に。最後には、魔法よりも大切な「友情」を感じさせてくれる、賑やかな物語の舞台です。",
            "アリエルのプレイグラウンド":"【BGS】トリトン王の宮殿のすぐ近く、神秘的な青い光が差し込む海底には、アリエルが人間界から集めた「宝物」や、海の仲間たちの遊び場が広がっています。ゲストは迷路のようなサンゴのトンネルを抜け、巨大なガイコツの口をくぐったり、アリエルの秘密の洞窟を覗いたりと、自由に歩き回って楽しむことができます。水が噴き出す不思議な仕掛けや、柔らかな地面など、小さなお子様から大人まで、まるで自分も人魚になったような気分で深い海の底の物語に浸れる場所です。",
            "ジャンピン・ジェリーフィッシュ":"【BGS】アリエルの父、トリトン王が治める海底王国。そこには、ゲストを背中に乗せて楽しく泳いでくれる、色とりどりの大きなクラゲたちがいます。大きな貝殻の椅子に座り、魔法のような力で海面へと浮き上がり、またゆっくりと海底へ……。視界に広がるのは、きらきらと輝くサンゴ礁や、海底の仲間たちが賑やかに暮らす美しい風景です。まるで自分が海の一部になったかのような、優しく穏やかな時間が流れる物語の一幕です。",
            "スカットルのスクーター":"【BGS】マーメイドラグーンの地上部分、アリエルのグリーティンググロットのすぐ近くに位置するこの場所では、物知りのカモメ（自称）、スカットルが望遠鏡を覗いてゲストを歓迎しています。ゲストは愛嬌たっぷりのヤドカリの背中に乗り込み、スカットルを中心にぐるぐると円を描くように進みます。ただ回転するだけでなく、コースには緩やかなアップダウンがあり、向かい側のゲストと目が合ったり、風を切る感覚が心地よかったりと、シンプルながらも笑顔が絶えない物語の世界が広がっています。",
            "フランダーのフライングフィッシュコースター":"【BGS】マーメイドラグーンの入り江（アバブ・ザ・シー）に位置するこのコースター。黄色と青の縞模様が可愛らしいフランダーが、ゲストのためにトビウオ（フライングフィッシュ）の背中に乗って海の上を滑走する特別なコースを用意してくれました。岩場をかすめるように急カーブを切り、水面ギリギリを駆け抜けるその爽快感は、まさに海辺を自由に飛び回る魚たちの気分そのもの。コースの途中からは、美しいマーメイドラグーンの全景や、遠くにそびえるプロメテウス火山を一瞬だけ眺めることもできる、心躍る物語の旅です。",
            "ブローフィッシュ・バルーンレース":"【BGS】マーメイドラグーンの屋内エリア、まるで水の泡の中にいるような幻想的な空間で、フグ（ブローフィッシュ）たちが自慢の喉を膨らませてレースを開催しています。ゲストは彼らが運ぶ貝殻のゴンドラに乗り込み、合図とともに一斉に空中へ！フグたちは円を描きながら、どんどんスピードを上げて泳ぎ（飛び）回ります。高い位置まで上がると、マーメイドラグーンの賑やかな海底の世界を一望でき、まるで自分も海の仲間たちと一緒にパーティーを楽しんでいるような、明るく弾む物語のひとときです。",
            "マーメイドラグーンシアター":"【BGS】海底王国の大きな劇場の幕が上がると、そこは色鮮やかなサンゴや泡が輝く幻想的な世界。アリエルは、人間の世界への憧れを歌い上げながら、ゲストのすぐ頭上まで自由に、そして優雅に泳いでやってきます。セバスチャンやフランダー、そして迫力満点のトリトン王も登場し、映画『リトル・マーメイド』の世界が目の前で繰り広げられます。美しい歌声と光、そして生き生きとしたパペットたちが織りなす、海底の王宮で開催される最高にハッピーな物語です。",
            "ワールプール":"【BGS】アンダー・ザ・シーの穏やかな潮だまり。ここでは、不思議なことに海流が渦を巻いています。ゲストは、海藻でできたカップ型のヴィークルに乗り込み、その渦の力に引き込まれるように回転を始めます。このアトラクションの面白いところは、カップに乗っている人たちの「重さ」や「座る位置」によって、回転のスピードや動きが刻々と変化すること。遠心力で外側に振られたり、急にスピードが上がったりと、予測できない動きが笑いを誘う、海底の小さくて賑やかな物語です。",
            "ストームライダー":"【BGS】ポートディスカバリーが誇る最新技術の結晶、ストームライダー。ゲストは「ミッション・コントロール」で、史上最大級の嵐を爆破して消し去るという壮大な計画の説明を受け、2機のストームライダーに分乗して嵐の目へと向かいます。しかし、最新鋭の機体をもってしても、自然の猛威は予想を超えていました。爆発の衝撃、降り注ぐ雨、そして機体に突き刺さる緊急事態……。キャプテン・デイビスの型破りな操縦とともに、荒れ狂う空を駆け抜ける、緊迫感と爽快感が融合した物語です。",
            "メディテレーニアンハーバー":"【BGS】東京ディズニーシーの入り口に広がるこの海は、冒険家や探検家たちが集う情熱の港です。イタリアのフィレンツェやポルトフィーノを彷彿とさせる美しい街並みには、16世紀のルネサンス期から続く歴史の香りが漂っています。穏やかな運河をゴンドラが行き交い、中央の大きな海では華やかなショーが繰り広げられる、まさにパークの心臓部とも言える場所。美しい風景の背後には、大航海時代の冒険家たちの野望や、富を築いた商人たちの物語が息づいています。",
            "アメリカンウォーターフロント":"【BGS】ここでは、時代が劇的に動いた20世紀初頭のアメリカを体験できます。そびえ立つ豪華客船「S.S.コロンビア号」が停泊するニューヨークの港には、最新の自動車が走り、高架鉄道がビルを縫うように進みます。劇場が建ち並び、人々が夢を追い求めた大都市の喧騒がそのまま再現されています。一方で、赤い砂岩の灯台が立つ「ケープコッド」へ足を運べば、穏やかな風が吹き、村人たちが助け合って暮らす温かな漁村の物語が広がっています。異なる二つの風景は、当時のアメリカが持っていた多様な希望と、自由な精神を象徴しています。",
            "ポートディスカバリー":"【BGS】水平線の向こうに見えるのは、私たちが夢見た未来の姿。ここポートディスカバリーは、かつての人々が思い描いた「未来」が現実のものとなった、美しくもどこか懐かしい風景が広がる港です。中心にそびえるのは、地球の気象をコントロールするために建てられた「気象コントロールセンター」。科学者たちが風の向きを変え、海の流れを研究し、自然と共生するための実験を日々繰り返しています。ポート内のあらゆるデザインは、水の波紋や風の動きを連想させる流線型で統一されており、テクノロジーの進歩がもたらす平和な物語を伝えています。（旧BGS）",
            "ミステリアスアイランド":"【BGS】1873年、ネモ船長はこの孤島に秘密の研究所を建設しました。島の中央にそびえるプロメテウス火山は、今もなお時折噴煙を上げ、大音響とともに溶岩を噴き出す活発な火山です。この港の最大の特徴は、ネモ船長が発明した驚異のマシンたち。地底を掘り進む巨大な削岩機や、深海を自在に移動する潜水艇など、当時の科学の粋を集めたデザインは、どこかレトロで力強い魅力に溢れています。ゲストは「志願クルー」として、この要塞のような基地に足を踏み入れ、地球の深淵に隠された謎を解き明かす物語の主役となります。",
            "ロストリバーデルタ":"【BGS】深い緑に覆われたジャングルの奥深く。ここには、かつて「失われた河（ロストリバー）」と呼ばれ、地図から消し去られていた伝説の地があります。巨大なピラミッド型の遺跡や、崩れかけた神殿の柱が立ち並び、精霊や神々の怒りが今もなお渦巻いていると言われています。川の向こう岸には、掘っ立て小屋のような食堂や、冒険家たちのキャンプが設営され、飛行機や蒸気船の音が絶え間なく響いています。一歩足を踏み入れれば、そこは文明の光が届かない、野生と神秘が支配する冒険の最前線です。",
            "マーメイドラグーン":"【BGS】トリトン王が人間と海の仲間たちが仲良く交流できるようにと作ったこの場所は、2つのエリアに分かれています。太陽の光が降り注ぐ地上エリア（アバブ・ザ・シー）では、アリエルが人間の世界を夢見て眺めたような、美しい海岸の景色が楽しめます。そして、巨大なトリトン王の像が迎えてくれる入り口から一歩足を踏み入れれば、そこは幻想的な「アンダー・ザ・シー（海底）」の世界。天井から差し込む揺らめく光、色とりどりの海洋植物、そして楽しげな音楽に包まれたこの場所は、まさに海の底に迷い込んだかのような没入感を味わえます。人にとってはどこか懐かしく、子供にとっては魔法のような発見に満ちた、心温まる物語の王国です。",
            "アラビアンコースト":"【BGS】ここには、2つの魅力的な物語の世界が広がっています。一歩足を踏み入れると、そこはアグラバーの宮廷を思わせる壮麗な建物が並ぶ「宮殿の中庭」。細やかなタイル装飾やドーム型の屋根が、優雅で高貴な雰囲気を作り出しています。一方で、さらに奥へと進むと、スパイスの香りが漂ってきそうな「市場（バザール）」のエリアへ。入り組んだ路地や露店には、商人たちの生活の息遣いが感じられ、まるで千夜一夜物語の世界に迷い込んだかのような体験ができます。ジーニーの遊び心と優しさが詰まった、誰もが主役になれる魔法の冒険の地です。",
            "ファンタジースプリングス":"【BGS】長年語り継がれてきたディズニーの物語が、魔法の泉の力によって現実のものとなった場所。入り口では、岩に刻まれたキャラクターたちの美しい石像がゲストを迎え、そこから未知なる物語の深淵へと誘われます。雪の女王の魔法によって作られた氷の宮殿が輝く「フローズンキングダム」、ラプンツェルが過ごした高い塔がそびえる「ラプンツェルの森」、そしてネバーランドの冒険が待つ「ピーターパンのネバーランド」。それぞれのエリアは、映画のスクリーンからそのまま抜け出してきたかのような圧倒的な没入感に包まれています。夜になると、泉の水は幻想的に光り輝き、訪れる人々をより深い夢の世界へと連れて行ってくれる、まさに「魔法が生まれた場所」です。"
        },
        "aliases": {
            "タワテラ": "タワー・オブ・テラー", "TOT": "タワー・オブ・テラー", "シリキ": "タワー・オブ・テラー", "ハイタワー": "タワー・オブ・テラー",
            "インディ": "インディ・ジョーンズ", "若さの泉": "インディ・ジョーンズ", "魔宮": "インディ・ジョーンズ", "パコ": "インディ・ジョーンズ",
            "ソアリン": "ソアリン：ファンタスティック・フライト", "カメリア": "ソアリン：ファンタスティック・フライト", "SEA": "S.E.A. (探検家冒険家学会)",
            "センター": "センター・オブ・ジ・アース", "ラーバ": "センター・オブ・ジ・アース", "ネモ": "センター・オブ・ジ・アース",
            "スプラッシュ": "スプラッシュ・マウンテン", "うさぎどん": "スプラッシュ・マウンテン", "滝": "スプラッシュ・マウンテン", "ラケッティ": "スプラッシュ・マウンテン",
            "ビッグサンダー": "ビッグサンダー・マウンテン", "暴走列車": "ビッグサンダー・マウンテン", "金山": "ビッグサンダー・マウンテン",
            "ホテマン": "ホーンテッドマンション", "幽霊屋敷": "ホーンテッドマンション", "グレイシー": "ホーンテッドマンション",
            "ハニハン": "プーさんのハニーハント", "蜂蜜": "プーさんのハニーハント",
            "スペマン": "スペース・マウンテン", "スタツア": "スター・ツアーズ", "スモワ": "イッツ・ア・スモールワールド",
            "カリブ": "カリブの海賊", "ジャック": "カリブの海賊", "美女野獣": "美女と野獣“魔法のものがたり”",
            "アナ雪": "アナとエルサのフローズンジャーニー", "ラプンツェル": "ラプンツェルのランタンフェスティバル", "ピーターパン": "ピーターパンのネバーランドアドベンチャー",
            "FS": "ファンタジースプリングス", "カヌー": "ビーバーブラザーズのカヌー探険", "マークトウェイン": "蒸気船マークトウェイン号",
            "ストームライダー": "ストームライダー (跡地解説)", "火山": "プロメテウス火山の地層", "地球": "アクアスフィア"
        }
    };

    let db = JSON.parse(localStorage.getItem('magical_lib_full_v1')) || defaultData;

    function toggleEditPanel() {
        document.getElementById('edit-overlay').classList.toggle('open');
        updateList();
    }

    function updateList() {
        const listDiv = document.getElementById('data-list');
        listDiv.innerHTML = "";
        Object.keys(db.content).sort().forEach(title => {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<span>${title}</span><span style="color:#f44; cursor:pointer;" onclick="deleteData('${title}')">&times;</span>`;
            item.onclick = (e) => { if(e.target.innerHTML !== '&times;') loadToEditor(title); };
            listDiv.appendChild(item);
        });
    }

    function loadToEditor(title) {
        document.getElementById('edit-title').value = title;
        document.getElementById('edit-content').value = db.content[title];
        let aliases = [];
        for(let a in db.aliases) { if(db.aliases[a] === title) aliases.push(a); }
        document.getElementById('edit-aliases').value = aliases.join(',');
    }

    function saveData() {
        const title = document.getElementById('edit-title').value.trim();
        const content = document.getElementById('edit-content').value.trim();
        const aliasList = document.getElementById('edit-aliases').value.split(',').map(s => s.trim());
        if(!title || !content) return alert("名称と解説を入力してください。");
        db.content[title] = content;
        for(let a in db.aliases) { if(db.aliases[a] === title) delete db.aliases[a]; }
        aliasList.forEach(a => { if(a) db.aliases[a] = title; });
        localStorage.setItem('magical_lib_full_v1', JSON.stringify(db));
        updateList();
        alert("更新しました。");
    }

    function deleteData(title) {
        if(!confirm(title + "を抹消しますか？")) return;
        delete db.content[title];
        for(let a in db.aliases) { if(db.aliases[a] === title) delete db.aliases[a]; }
        localStorage.setItem('magical_lib_full_v1', JSON.stringify(db));
        updateList();
    }

    function ask() {
        const input = document.getElementById('user-input');
        const query = input.value.trim();
        if(!query) return;

        const log = document.getElementById('chat-log');
        const userMsg = document.createElement('div');
        userMsg.className = 'bubble user';
        userMsg.innerText = query;
        log.appendChild(userMsg);
        input.value = "";

        setTimeout(() => {
            let targetTitle = query;
            for(let key in db.aliases) {
                if(query.toUpperCase() === key.toUpperCase()) {
                    targetTitle = db.aliases[key];
                    break;
                }
            }
            const botMsg = document.createElement('div');
            botMsg.className = 'bubble bot';
            if(db.content[targetTitle]) {
                botMsg.innerHTML = `<span class="story-title">${targetTitle}</span>${db.content[targetTitle]}`;
            } else {
                let partialMatch = Object.keys(db.content).find(k => k.includes(query) || query.includes(k));
                if(partialMatch) {
                    botMsg.innerHTML = `<span class="story-title">${partialMatch}</span>${db.content[partialMatch]}`;
                } else {
                    botMsg.innerText = "すみません。その記録は見当たりません。編纂ボタンから追記してください。";
                }
            }
            log.appendChild(botMsg);
            document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
        }, 300);
    }

    function resetDefault() {
        if(confirm("全編集内容を消去し、初期状態に戻しますか？")) {
            localStorage.removeItem('magical_lib_full_v1');
            location.reload();
        }
    }

    document.getElementById("user-input").addEventListener("keypress", (e) => { if (e.key === "Enter") ask(); });
    updateList();
</script>
</body>
</html>
